<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="styles/reset.css">
  <title>Pizza</title>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header__logo-container">
        <img src="./public/logo.svg" alt="Logo Pizza" class="header__logo">
        <div class="header__logo-text">
          <h2 class="header__logo-title">PIZZA</h2>
          <p class="header__logo-subtitle">самая вкусная пицца во вселенной</p>
        </div>
      </div>

      <button onclick="window.location.href = '/pizza/pages/cart/cart.html'" class="header__btn">
        <p class="header__btn-price">520 ₽</p>
        <div class="header__btn-separate"></div>
        <div class="header__btn-cart">
          <img src="./public/icons/header/cart.svg" alt="Cart" class="cart__icon">
          <p class="header__btn-cart-count">3</p>
        </div>
      </button>
    </header>
    <div class="panel">
      <div class="filters"></div>
    </div>
    
    <main>
      <h2 class="main-title">Все пиццы</h2>
      <ul class="pizzas-list"></ul>
    </main>

  </div>

  <script src="./js/index.js"></script>
</body>
</html>
