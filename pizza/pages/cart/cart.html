<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="cart.css">
  <link rel="stylesheet" href="../../styles/reset.css">
  <title>Document</title>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header__logo-container">
        <img src="../../public/logo.svg" alt="Logo Pizza" class="header__logo">
        <div class="header__logo-text">
          <h2 class="header__logo-title">PIZZA</h2>
          <p class="header__logo-subtitle">самая вкусная пицца во вселенной</p>
        </div>
      </div>
    </header>

    <main>
      <ul class="cart-list">
        <header class="cart-header">
        <div class="cart-header-logo">
          <img src="../../public/icons/cart/cart.svg" alt="">
          <h2 class="cart-header-title">Корзина</h2>
        </div>
        <button class="cart-header-clear">
          <img src="../../public/icons/cart/trash.svg" alt="">
          <p class="cart-header-clear-text">Очистить корзину</p>
        </button>
      </header>
        <li class="cart-item">
          <div class="cart-item-block">
            <div class="block-info">
              <img class="block-info-img" src="https://media.dodostatic.net/image/r:584x584/0199b77856ec79a986a2d582c2678fff.avif" alt="">
              <div class="block-info-text">
                <h4>Сырный цыпленок</h4>
                <p>тонкое тесто, 26 см.</p>
              </div>
            </div>
            <div class="block-quantity">
              <button class="quantity-remove">
                <img src="../../public/icons/cart/remove.svg" alt="">
              </button>
              <span class="quantity-value">2</span>
              <button class="quantity-add">
                <img src="../../public/icons/cart/add.svg" alt="">
              </button>
            </div>
            <p class="cart-item-price">770 ₽</p>
            <button class="cart-item-delete">
              <img src="../../public/icons/cart/clear.svg" alt="">
            </button>
          </div>
        </li>
      </ul>
    </main>
  </div>

  <script src="cart.js"></script>
</body>
</html>
