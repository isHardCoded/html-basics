<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="cart.css">
  <link rel="stylesheet" href="../../styles/reset.css">
  <title>Document</title>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header__logo-container">
        <img src="../../public/logo.svg" alt="Logo Pizza" class="header__logo">
        <div class="header__logo-text">
          <h2 class="header__logo-title">PIZZA</h2>
          <p class="header__logo-subtitle">самая вкусная пицца во вселенной</p>
        </div>
      </div>
    </header>

    <main>
      <ul class="cart-list">
        <header class="cart-header">
        <div class="cart-header-logo">
          <img src="../../public/icons/cart/cart.svg" alt="">
          <h2 class="cart-header-title">Корзина</h2>
        </div>
        <button class="cart-header-clear">
          <img src="../../public/icons/cart/trash.svg" alt="">
          <p class="cart-header-clear-text">Очистить корзину</p>
        </button>
        </header>
      </ul>
    </main>
  </div>

  <script src="cart.js"></script>
</body>
</html>
